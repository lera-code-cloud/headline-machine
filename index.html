function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const escapedQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(escapedQ, 'gi'), m => `<mark>${m}</mark>`);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderBank(query) {
  const bank = loadBank();
  const list = document.getElementById('bankList');
  const stats = document.getElementById('bankStats');
  const toolbar = document.getElementById('bankToolbar');

  if (bank.length === 0) {
    stats.innerHTML = '';
    toolbar.style.display = 'none';
    list.innerHTML = `<div class="bank-empty"><div class="bank-empty-icon">🗄</div><div class="bank-empty-text">No headlines saved yet.<br>Generate headlines and click "Save to Bank" or "+ Save all to Bank".</div></div>`;
    return;
  }

  toolbar.style.display = 'flex';
  const newsCount = bank.filter(i => i.mode === 'news').length;
  const photoCount = bank.filter(i => i.mode === 'photo').length;
  stats.innerHTML = `
    <div class="bank-stat"><div class="bank-stat-num">${bank.length}</div><div class="bank-stat-label">Total</div></div>
    ${newsCount ? `<div class="bank-stat"><div class="bank-stat-num">${newsCount}</div><div class="bank-stat-label">News</div></div>` : ''}
    ${photoCount ? `<div class="bank-stat"><div class="bank-stat-num">${photoCount}</div><div class="bank-stat-label">Photo</div></div>` : ''}
  `;

  const filtered = query ? bank.filter(i => i.text.toLowerCase().includes(query)) : bank;
  if (filtered.length === 0) {
    list.innerHTML = `<div class="bank-no-results">No headlines match "<strong>${escapeHtml(query)}</strong>"</div>`;
    return;
  }

  const groups = {};
  filtered.forEach(item => {
    const d = new Date(item.savedAt);
    const label = formatGroupDate(d);
    if (!groups[label]) groups[label] = [];
    groups[label].push(item);
  });

  list.innerHTML = Object.entries(groups).map(([label, items]) => `
    <div class="bank-group">
      <div class="bank-group-header">
        <span class="bank-group-title">${label}</span>
        <span class="bank-group-meta">${items.length} headline${items.length !== 1 ? 's' : ''}</span>
      </div>
      ${items.map(item => `
        <div class="bank-item" id="bi-${item.id}">
          <div class="bank-item-left">
            <div class="bank-item-text">${highlight(item.text, query)}</div>
            <div class="bank-item-meta">
              <span class="bank-item-angle">${item.angle}</span>
              <span class="mode-badge ${item.mode}">${item.mode}</span>
            </div>
          </div>
          <div class="bank-item-actions">
            <button class="bank-copy-btn" onclick="bankCopy(this, '${escapeHtml(item.text).replace(/'/g,"\\'")}')">Copy</button>
            <button class="bank-delete-btn" onclick="bankDelete(${item.id})">✕</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function formatGroupDate(d) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const itemDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = (today - itemDay) / 86400000;
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

}

}

async function generate(mode) {
  const rawInput = document.getElementById("mainInput").value.trim();
  if (!rawInput) return;

  const intrigue = document.getElementById("intrigueInput").value.trim();
  const btn = document.getElementById("genBtn");
  const regenBtn = document.getElementById("regenBtn");
  btn.disabled = true;
  regenBtn.disabled = true;
  setStatus(true);
  setError("");

  try {
    let messages = [];

    if (currentMode === 'photo') {
      const inputType = detectInputType(rawInput);

      if (inputType === 'image') {
        setStatusText('Loading image…');
        let imageData, mediaType;
        try {
          const resp = await fetch(rawInput);
          if (!resp.ok) throw new Error('Image fetch failed');
          const blob = await resp.blob();
          mediaType = blob.type || 'image/jpeg';
          imageData = await blobToBase64(blob);
        } catch(e) { imageData = null; }

        if (imageData) {
          const photoParams = buildPhotoParams(intrigue, mode);
          messages = [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: imageData } },
            { type: 'text', text: `Analyze this image carefully — who is in it, what are they doing, what is notable (outfits, expressions, setting, mood, body language, visual contrasts). Then generate headlines for a photo article based on what you see.\n\n${photoParams}` }
          ]}];
        } else {
          const photoParams = buildPhotoParams(intrigue, mode);
          messages = [{ role: 'user', content: `Direct image URL (analyze visually if possible, otherwise use URL context): ${rawInput}\n\n${photoParams}` }];
        }
      } else if (inputType === 'url') {
        setStatusText('Fetching page…');
        let pageContent = '';
        try {
          const fetchResp = await fetch('/api/fetch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: rawInput }) });
          if (fetchResp.ok) { const fetchData = await fetchResp.json(); pageContent = fetchData.text || fetchData.content || ''; }
        } catch(e) {}
        const photoParams = buildPhotoParams(intrigue, mode);
        if (pageContent) {
          messages = [{ role: 'user', content: `Page content fetched from ${rawInput}:\n\n${pageContent.slice(0, 4000)}\n\n${photoParams}` }];
        } else {
          messages = [{ role: 'user', content: `Page URL: ${rawInput}\n\nBased on the URL and any context you can infer, generate photo article headlines.\n\n${photoParams}` }];
        }
      } else {
        const photoParams = buildPhotoParams(intrigue, mode);
        messages = [{ role: 'user', content: `${rawInput}\n\n${photoParams}` }];
      }
    } else {
      let userMsg = rawInput;
      if (intrigue) {
        userMsg += `\n\n---\nINTRIGUE — USE THIS AS THE CORE HOOK FOR ALL HEADLINES:\n"${intrigue}"\n\nAll 5 angles and every headline must be built around this specific intrigue. Each angle approaches the same intrigue from a different emotional and structural lens.`;
      }
      if (mode === "more") {
        userMsg += `\n\nGenerate 7 DIFFERENT headlines per angle. Do not repeat any headline from before.`;
      }
      messages = [{ role: 'user', content: userMsg }];
    }

    setStatusText('Generating…');
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 2000, system: currentPrompt, messages })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error("No JSON in response");
    lastResult = JSON.parse(match[0]);
    renderOutput(lastResult);
    document.getElementById("regenBtn").style.display = "inline-block";

  } catch(e) {
    setError("Error: " + e.message);
  }

  btn.disabled = false;
  regenBtn.disabled = false;
  setStatus(false);
}

function buildPhotoParams(intrigue, mode) {
  const photoCount = document.getElementById('photoCount').value.trim() || '30+';
  const photoSubtype = document.getElementById('photoSubtype').value;
  const subtypeLabels = {
    transformation: 'transformation / physical change over time',
    family: 'family life, kids, or relationship',
    love_story: 'love story or couple journey',
    career: 'career journey or rise to fame',
    outfits: 'outfits, style, or red carpet looks',
    then_now_cast: 'then & now or cast reunion',
    biography: 'biography or life story',
    other: 'general / other (choose the best angle based on the content)'
  };
  let params = `PHOTO ARTICLE PARAMETERS:\n- Photo count: ${photoCount}\n- Article subtype: ${subtypeLabels[photoSubtype] || photoSubtype}\n- Photo descriptor: Choose the most accurate descriptor based on the content (rare, little-seen, private, intimate, wild, then-and-now, before-and-after, behind-the-scenes, genuine/candid). Vary descriptors across headlines — do NOT use the same word every time.\n\nEvery headline MUST end with the photo count "${photoCount}" + chosen descriptor + PHOTOS/PICS/IMAGES.`;
  if (intrigue) {
    params += `\n\nINTRIGUE — USE THIS AS THE CORE HOOK FOR ALL HEADLINES:\n"${intrigue}"\n\nAll 5 angles and every headline must be built around this specific intrigue.`;
  }
  if (mode === "more") {
    params += `\n\nGenerate 7 DIFFERENT headlines per angle. Do not repeat any headline from before.`;
  }
  return params;
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function setStatus(loading) {
  if (!loading) { document.getElementById("status").innerHTML = ""; return; }
  document.getElementById("status").innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
}

function setStatusText(text) {
  document.getElementById("status").innerHTML = `<span style="color:#6b6560;font-size:13px">${text}</span>`;
}

function setError(msg) {
  const el = document.getElementById("errorBar");
  el.style.display = msg ? "block" : "none";
  el.textContent = msg;
}

function renderOutput(result) {
  const out = document.getElementById("output");
  const sections = document.getElementById("anglesSections");
  out.style.display = "block";

  const angles = currentMode === 'photo' ? PHOTO_ANGLES : NEWS_ANGLES;
  const badgeClass = currentMode === 'photo' ? 'photo' : 'news';
  const badgeLabel = currentMode === 'photo' ? 'Photo' : 'News';

  sections.innerHTML = angles.map(a => {
    const headlines = result[a.key] || [];
    return `<div class="angle-section">
      <div class="angle-title">
        <span class="angle-icon">${a.icon}</span>${a.label}
        <span class="mode-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      ${headlines.map((h) => `
        <div class="headline-item">
          <div class="headline-text">${h}</div>
          <div class="headline-actions">
            <button class="copy-hl" onclick="copyHeadline(this, '${h.replace(/'/g,"\\'")}')">Copy</button>
          </div>
        </div>`).join("")}
    </div>`;
  }).join("");

  angles.forEach(a => { (result[a.key] || []).forEach(h => addToBank(h, a.label, currentMode)); });
  updateBankBadge();
  out.scrollIntoView({ behavior: "smooth", block: "start" });
}

function saveHeadlineFromOutput(btn, text, angle) {
  const added = addToBank(text, angle, currentMode);
  if (added) { btn.textContent = '✓ Saved'; btn.classList.add('saved'); setTimeout(() => { btn.textContent = '+ Bank'; btn.classList.remove('saved'); }, 2000); }
  else { btn.textContent = 'In Bank'; setTimeout(() => { btn.textContent = '+ Bank'; }, 1500); }
  updateBankBadge();
}

function copyHeadline(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "Copied";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  });
}

function copyAll() {
  if (!lastResult) return;
  const angles = currentMode === 'photo' ? PHOTO_ANGLES : NEWS_ANGLES;
  const lines = angles.flatMap(a => { const hs = lastResult[a.key] || []; return [`\n${a.label.toUpperCase()}`, ...hs]; });
  navigator.clipboard.writeText(lines.join("\n")).then(() => {
    const btn = document.querySelector(".output-toolbar .tool-btn");
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy all", 2000);
  });
}

function resetOutput() {
  document.getElementById("output").style.display = "none";
  document.getElementById("mainInput").value = "";
  document.getElementById("intrigueInput").value = "";
  document.getElementById("regenBtn").style.display = "none";
  document.getElementById('inputTypeBadge').classList.remove('visible');
  lastResult = null;
}

document.getElementById("mainInput").addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) generate("all");
});

updateBankBadge();
</script>
</body>
</html>
