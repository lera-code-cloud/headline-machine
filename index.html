body::before {
  content: ""; position: fixed; inset: 0;
  background: rgba(18,18,18,0.62);
  z-index: 0; pointer-events: none;
}
body > * { position: relative; z-index: 1; }

header { background: rgba(26,26,26,0.88); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 0.5px solid #2e2e2e; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header-left h1 { font-size: 16px; font-weight: 500; color: #e8e0d8; }
.header-left p { font-size: 12px; color: #6b6560; margin-top: 2px; }
.header-right { display: flex; gap: 8px; align-items: center; }
.hm-logo { width: 44px; height: 44px; background: #e8e0d8; border-radius: 11px; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
.hm-logo span { font-family: 'Playfair Display', serif; font-size: 20px; font-style: italic; color: #1a1a1a; letter-spacing: 0.02em; }
.settings-btn { background: none; border: 0.5px solid #2e2e2e; border-radius: 8px; padding: 7px 16px; font-size: 12px; font-family: inherit; color: #6b6560; cursor: pointer; letter-spacing: .04em; transition: border-color .2s, color .2s; }
.settings-btn:hover { border-color: #c8b89a; color: #e8e0d8; }
.settings-btn.active { border-color: #c8b89a; color: #c8b89a; }
.bank-nav-btn { background: none; border: 0.5px solid #2e2e2e; border-radius: 8px; padding: 7px 16px; font-size: 12px; font-family: inherit; color: #6b6560; cursor: pointer; letter-spacing: .04em; transition: all .2s; display: flex; align-items: center; gap: 6px; }
.bank-nav-btn:hover { border-color: #c8b89a; color: #e8e0d8; }
.bank-nav-btn.active { border-color: #c8b89a; color: #c8b89a; }
.bank-count { background: #2e2e2e; border-radius: 10px; padding: 1px 7px; font-size: 11px; color: #9a8f85; transition: background .2s; }
.bank-nav-btn.active .bank-count { background: #3a2e1e; color: #c8b89a; }
.prompt-editor { display: none; background: #1a1a1a; border: 0.5px solid #2e2e2e; border-radius: 16px; padding: 24px 28px; margin-bottom: 20px; }
.prompt-editor.open { display: block; }
.editor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.editor-label { font-size: 11px; font-weight: 500; color: #6b6560; text-transform: uppercase; letter-spacing: .08em; }
.editor-actions { display: flex; gap: 8px; align-items: center; }
.saved-badge { font-size: 12px; color: #7ab060; opacity: 0; transition: opacity .3s; }
.saved-badge.show { opacity: 1; }
.pill-btn { background: none; border: 0.5px solid #2e2e2e; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-family: inherit; color: #9a8f85; cursor: pointer; transition: all .2s; }
.pill-btn:hover { border-color: #c8b89a; color: #e8e0d8; }
.pill-btn.save { background: #e8e0d8; color: #121212; border-color: #e8e0d8; }
.pill-btn.save:hover { background: #fff; }
#promptEditorArea { width: 100%; background: #111; border: 0.5px solid #2e2e2e; border-radius: 10px; padding: 16px; font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; color: #c8b89a; resize: vertical; min-height: 220px; outline: none; transition: border-color .2s; line-height: 1.6; }
#promptEditorArea:focus { border-color: #c8b89a; }
#mainView { display: block; }
#bankView { display: none; }
.container { max-width: 820px; margin: 0 auto; padding: 28px 20px; }
.mode-toggle { display: flex; gap: 0; margin-bottom: 20px; border: 0.5px solid #2e2e2e; border-radius: 10px; overflow: hidden; width: fit-content; }
.mode-btn { background: none; border: none; padding: 9px 20px; font-size: 13px; font-family: inherit; color: #6b6560; cursor: pointer; transition: all .2s; white-space: nowrap; }
.mode-btn:hover { color: #e8e0d8; background: #1f1f1f; }
.mode-btn.active { background: #e8e0d8; color: #121212; font-weight: 500; }
.input-card { background: transparent; border: 0.5px solid rgba(200,184,154,0.2); border-radius: 16px; padding: 24px 28px; margin-bottom: 20px; }
.input-label { font-size: 11px; font-weight: 500; color: #6b6560; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; display: block; }
.input-hint { font-size: 12px; color: #4a4540; margin-bottom: 10px; line-height: 1.5; }
textarea#mainInput { width: 100%; background: rgba(18,18,18,0.25); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); border: 0.5px solid rgba(200,184,154,0.25); border-radius: 10px; padding: 14px 16px; font-size: 14px; font-family: inherit; color: #e8e0d8; resize: vertical; min-height: 120px; outline: none; transition: border-color .2s; line-height: 1.6; }
textarea#mainInput::placeholder { color: #4a4540; }
textarea#mainInput:focus { border-color: rgba(200,184,154,0.6); background: rgba(18,18,18,0.45); }
.input-type-badge { display: none; align-items: center; gap: 6px; margin-top: 8px; font-size: 12px; color: #6b6560; }
.input-type-badge.visible { display: flex; }
.input-type-dot { width: 6px; height: 6px; border-radius: 50%; background: #c8b89a; flex-shrink: 0; }
.input-type-dot.img { background: #7ab060; }
.input-type-dot.url { background: #a0b8e8; }
.intrigue-card { background: transparent; border: 0.5px solid rgba(200,184,154,0.15); border-radius: 16px; padding: 20px 28px; margin-bottom: 20px; }
.intrigue-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.intrigue-label { font-size: 11px; font-weight: 500; color: #6b6560; text-transform: uppercase; letter-spacing: .08em; }
.optional-badge { font-size: 11px; color: #4a4540; background: #111; border: 0.5px solid #2e2e2e; border-radius: 6px; padding: 2px 8px; }
textarea#intrigueInput { width: 100%; background: rgba(18,18,18,0.25); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); border: 0.5px solid rgba(200,184,154,0.2); border-radius: 10px; padding: 14px 16px; font-size: 14px; font-family: inherit; color: #e8e0d8; resize: vertical; min-height: 72px; outline: none; transition: border-color .2s; line-height: 1.6; }
textarea#intrigueInput::placeholder { color: #4a4540; }
textarea#intrigueInput:focus { border-color: rgba(200,184,154,0.5); background: rgba(18,18,18,0.45); }
.photo-fields { display: none; }
.photo-fields.visible { display: block; }
.photo-row { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
.photo-row .field-group { flex: 1; min-width: 140px; }
.field-group label { font-size: 11px; font-weight: 500; color: #6b6560; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; display: block; }
.field-group input, .field-group select { width: 100%; background: #111; border: 0.5px solid #2e2e2e; border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: inherit; color: #e8e0d8; outline: none; transition: border-color .2s; }
.field-group input::placeholder { color: #4a4540; }
.field-group input:focus, .field-group select:focus { border-color: #c8b89a; }
.field-group select option { background: #1a1a1a; }
.btn-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.gen-btn { background: #e8e0d8; color: #121212; border: none; border-radius: 10px; padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background .2s; }
.gen-btn:hover { background: #fff; }
.gen-btn:disabled { opacity: .35; cursor: not-allowed; }
.angle-btn { background: none; border: 0.5px solid #2e2e2e; border-radius: 10px; padding: 10px 18px; font-size: 13px; font-family: inherit; color: #9a8f85; cursor: pointer; transition: all .2s; }
.angle-btn:hover { border-color: #c8b89a; color: #e8e0d8; }
.angle-btn:disabled { opacity: .35; cursor: not-allowed; }
#status { font-size: 13px; color: #6b6560; margin-top: 10px; min-height: 18px; }
.dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #c8b89a; margin: 0 2px; animation: pulse .9s infinite alternate; }
.dot:nth-child(2) { animation-delay: .3s; }
.dot:nth-child(3) { animation-delay: .6s; }
@keyframes pulse { from { opacity: .2; } to { opacity: 1; } }
#output { display: none; }

4. WARMTH IS ALLOWED — Photo articles can be warm, admiring, nostalgic
5. ROLE STACKING — "Cancer Survivor, Single Dad, TV Icon — HOW HE LOOKS NOW IN 30+ PICS"
6. 12–20 words per headline
7. CAPS on 1–3 highest-impact words per headline

## FORBIDDEN WORDS — NEVER USE
kill/killer · murder · attack · assault · shoot/shooting · stab · blood/gore · torture · weapon · gun · knife · war · racism · nazi · suicide · self-harm · overdose · sex/sexual · nude · porn · rape · underage · minor · drugs · cocaine · heroin · scam · fraud · fuck · shit · bitch · abortion · miscarriage`;

const NEWS_ANGLES = [
  { key: "shock",       label: "Shock",         icon: "⚡" },
  { key: "inspiration", label: "Inspiration",   icon: "✨" },
  { key: "controversy", label: "Controversy",   icon: "🔥" },
  { key: "personal",    label: "Personal Story", icon: "🤍" },
  { key: "numbers",     label: "Numbers",        icon: "📊" },
];

const PHOTO_ANGLES = [
  { key: "visual_story",   label: "Visual Story",   icon: "📷" },
  { key: "transformation", label: "Transformation", icon: "🔄" },
  { key: "family_love",    label: "Family & Love",  icon: "🤍" },
  { key: "rare_access",    label: "Rare Access",    icon: "🔑" },
  { key: "journey",        label: "Journey",        icon: "🌟" },
];

let currentMode = 'news';
let currentPrompt = localStorage.getItem("headlineMachinePrompt") || NEWS_PROMPT;
let lastResult = null;

document.getElementById("promptEditorArea").value = currentPrompt;

function loadBank() {
  try { return JSON.parse(localStorage.getItem('headlineBank') || '[]'); }
  catch(e) { return []; }
}

function saveBank(bank) {
  localStorage.setItem('headlineBank', JSON.stringify(bank));
  updateBankBadge();
}

function updateBankBadge() {
  const bank = loadBank();
  document.getElementById('bankCountBadge').textContent = bank.length;
}

function addToBank(headline, angle, mode) {
  const bank = loadBank();
  if (bank.some(item => item.text === headline)) return false;
  bank.unshift({ id: Date.now() + Math.random(), text: headline, angle, mode, savedAt: new Date().toISOString() });
  saveBank(bank);
  return true;
}

function removeFromBank(id) {
  const bank = loadBank().filter(item => item.id !== id);
  saveBank(bank);
}

function clearBank() {
  if (!confirm('Clear all headlines from the bank?')) return;
  localStorage.removeItem('headlineBank');
  updateBankBadge();
  renderBank('');
}

function showView(view) {
  document.getElementById('mainView').style.display = view === 'main' ? 'block' : 'none';
  document.getElementById('bankView').style.display = view === 'bank' ? 'block' : 'none';
  document.getElementById('bankNavBtn').classList.toggle('active', view === 'bank');
  if (view === 'bank') {
    document.getElementById('bankSearch').value = '';
    document.getElementById('bankSearchClear').classList.remove('visible');
    renderBank('');
  }
}

document.querySelector('.header-left').style.cursor = 'pointer';
document.querySelector('.header-left').onclick = () => showView('main');

function handleBankSearch(val) {
  document.getElementById('bankSearchClear').classList.toggle('visible', val.length > 0);
  renderBank(val.trim().toLowerCase());
}

function clearBankSearch() {
  document.getElementById('bankSearch').value = '';
  document.getElementById('bankSearchClear').classList.remove('visible');
  renderBank('');
}

function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const escapedQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(escapedQ, 'gi'), m => `<mark>${m}</mark>`);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderBank(query) {
  const bank = loadBank();
  const list = document.getElementById('bankList');
  const stats = document.getElementById('bankStats');
  const toolbar = document.getElementById('bankToolbar');

  if (bank.length === 0) {
    stats.innerHTML = '';
    toolbar.style.display = 'none';
    list.innerHTML = `<div class="bank-empty"><div class="bank-empty-icon">🗄</div><div class="bank-empty-text">No headlines saved yet.<br>Generate headlines and click "Save to Bank" or "+ Save all to Bank".</div></div>`;
    return;
  }

  toolbar.style.display = 'flex';
  const newsCount = bank.filter(i => i.mode === 'news').length;
  const photoCount = bank.filter(i => i.mode === 'photo').length;
  stats.innerHTML = `
    <div class="bank-stat"><div class="bank-stat-num">${bank.length}</div><div class="bank-stat-label">Total</div></div>
    ${newsCount ? `<div class="bank-stat"><div class="bank-stat-num">${newsCount}</div><div class="bank-stat-label">News</div></div>` : ''}
    ${photoCount ? `<div class="bank-stat"><div class="bank-stat-num">${photoCount}</div><div class="bank-stat-label">Photo</div></div>` : ''}
  `;

  const filtered = query ? bank.filter(i => i.text.toLowerCase().includes(query)) : bank;
  if (filtered.length === 0) {
    list.innerHTML = `<div class="bank-no-results">No headlines match "<strong>${escapeHtml(query)}</strong>"</div>`;
    return;
  }

  const groups = {};
  filtered.forEach(item => {
    const d = new Date(item.savedAt);
    const label = formatGroupDate(d);
    if (!groups[label]) groups[label] = [];
    groups[label].push(item);
  });

  list.innerHTML = Object.entries(groups).map(([label, items]) => `
    <div class="bank-group">
      <div class="bank-group-header">
        <span class="bank-group-title">${label}</span>
        <span class="bank-group-meta">${items.length} headline${items.length !== 1 ? 's' : ''}</span>
      </div>
      ${items.map(item => `
        <div class="bank-item" id="bi-${item.id}">
          <div class="bank-item-left">
            <div class="bank-item-text">${highlight(item.text, query)}</div>
            <div class="bank-item-meta">
              <span class="bank-item-angle">${item.angle}</span>
              <span class="mode-badge ${item.mode}">${item.mode}</span>
            </div>
          </div>
          <div class="bank-item-actions">
            <button class="bank-copy-btn" onclick="bankCopy(this, '${escapeHtml(item.text).replace(/'/g,"\\'")}')">Copy</button>
            <button class="bank-delete-btn" onclick="bankDelete(${item.id})">✕</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function formatGroupDate(d) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const itemDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = (today - itemDay) / 86400000;
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function bankCopy(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function bankDelete(id) {
  removeFromBank(id);
  const el = document.getElementById('bi-' + id);
  if (el) { el.style.opacity = '0'; el.style.transition = 'opacity .2s'; setTimeout(() => renderBank(document.getElementById('bankSearch').value.trim().toLowerCase()), 200); }
}

function exportBank() {
  const bank = loadBank();
  const query = document.getElementById('bankSearch').value.trim().toLowerCase();
  const filtered = query ? bank.filter(i => i.text.toLowerCase().includes(query)) : bank;
  const lines = filtered.map(i => `[${i.mode.toUpperCase()} · ${i.angle}]\n${i.text}`).join('\n\n');
  const blob = new Blob([lines], { type: 'text/plain' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'headline-bank.txt'; a.click();
}

function saveToBank(headline, angle) {
  const added = addToBank(headline, angle, currentMode);
  showToast(added ? '✓ Saved to Bank' : 'Already in Bank');
  updateBankBadge();
}

function saveAllToBank() {
  if (!lastResult) return;
  const angles = currentMode === 'photo' ? PHOTO_ANGLES : NEWS_ANGLES;
  let added = 0;
  angles.forEach(a => { (lastResult[a.key] || []).forEach(h => { if (addToBank(h, a.label, currentMode)) added++; }); });
  showToast(added ? `✓ ${added} headline${added !== 1 ? 's' : ''} saved to Bank` : 'All already in Bank');
  updateBankBadge();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

const IMAGE_EXTS = /\.(jpg|jpeg|png|webp|gif|avif)(\?.*)?$/i;

function detectInputType(val) {
  const v = val.trim();
  if (!v) return null;
  if (IMAGE_EXTS.test(v) && v.startsWith('http')) return 'image';
  if (v.startsWith('http')) return 'url';
  return 'text';
}

document.getElementById('mainInput').addEventListener('input', function() {
  if (currentMode !== 'photo') return;
  const type = detectInputType(this.value);
  const badge = document.getElementById('inputTypeBadge');
  const dot = document.getElementById('inputTypeDot');
  const text = document.getElementById('inputTypeText');
  if (!type || type === 'text') { badge.classList.remove('visible'); return; }
  badge.classList.add('visible');
  if (type === 'image') { dot.className = 'input-type-dot img'; text.textContent = 'Direct image URL detected — will be analyzed visually'; }
  else { dot.className = 'input-type-dot url'; text.textContent = 'Page URL detected — will fetch content automatically'; }
});

function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeNews').classList.toggle('active', mode === 'news');
  document.getElementById('modePhoto').classList.toggle('active', mode === 'photo');
  document.getElementById('photoFields').classList.toggle('visible', mode === 'photo');
  document.getElementById('inputHint').style.display = mode === 'photo' ? 'block' : 'none';
  document.getElementById('inputTypeBadge').classList.remove('visible');

  if (mode === 'photo') {
    document.getElementById('inputLabel').textContent = 'Person, story, or topic for the photo article';
    document.getElementById('mainInput').placeholder = 'Text description, direct image URL (.jpg/.png/.webp), or any page link — the tool figures out the rest';
    document.getElementById('intrigueInput').placeholder = 'The visual hook or key detail — e.g. "Their kids all have curly hair like Russell" or "She looked completely different at 25"';
    currentPrompt = localStorage.getItem("headlineMachinePhotoPrompt") || PHOTO_PROMPT;
  } else {
    document.getElementById('inputLabel').textContent = 'Raw headline, article text, URL, or topic';
    document.getElementById('mainInput').placeholder = 'Paste a raw headline, article text, URL, or describe the story…';
    document.getElementById('intrigueInput').placeholder = 'Specify the core hook you want all headlines to build around — e.g. "He was hiding his identity for 12 years"';
    currentPrompt = localStorage.getItem("headlineMachinePrompt") || NEWS_PROMPT;
  }
  document.getElementById("promptEditorArea").value = currentPrompt;
  resetOutput();
}

function toggleEditor() {
  const wrap = document.getElementById("promptEditorWrap");
  const btn = document.getElementById("settingsToggle");
  wrap.classList.toggle("open");
  btn.classList.toggle("active", wrap.classList.contains("open"));
}

function savePrompt() {
  const val = document.getElementById("promptEditorArea").value;
  currentPrompt = val;
  localStorage.setItem(currentMode === 'photo' ? "headlineMachinePhotoPrompt" : "headlineMachinePrompt", val);
  showSaved();
}

function resetPrompt() {
  const def = currentMode === 'photo' ? PHOTO_PROMPT : NEWS_PROMPT;
  document.getElementById("promptEditorArea").value = def;
  currentPrompt = def;
  localStorage.setItem(currentMode === 'photo' ? "headlineMachinePhotoPrompt" : "headlineMachinePrompt", def);
  showSaved();
}

function showSaved() {
  const b = document.getElementById("savedBadge");
  b.classList.add("show");
  setTimeout(() => b.classList.remove("show"), 2000);
}

async function generate(mode) {
  const rawInput = document.getElementById("mainInput").value.trim();
  if (!rawInput) return;

  const intrigue = document.getElementById("intrigueInput").value.trim();
  const btn = document.getElementById("genBtn");
  const regenBtn = document.getElementById("regenBtn");
  btn.disabled = true;
  regenBtn.disabled = true;
  setStatus(true);
  setError("");

  try {
    let messages = [];

    if (currentMode === 'photo') {
      const inputType = detectInputType(rawInput);

      if (inputType === 'image') {
        setStatusText('Loading image…');
        let imageData, mediaType;
        try {
          const resp = await fetch(rawInput);
          if (!resp.ok) throw new Error('Image fetch failed');
          const blob = await resp.blob();
          mediaType = blob.type || 'image/jpeg';
          imageData = await blobToBase64(blob);
        } catch(e) { imageData = null; }

        if (imageData) {
          const photoParams = buildPhotoParams(intrigue, mode);
          messages = [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: imageData } },
            { type: 'text', text: `Analyze this image carefully — who is in it, what are they doing, what is notable (outfits, expressions, setting, mood, body language, visual contrasts). Then generate headlines for a photo article based on what you see.\n\n${photoParams}` }
          ]}];
        } else {
          const photoParams = buildPhotoParams(intrigue, mode);
          messages = [{ role: 'user', content: `Direct image URL (analyze visually if possible, otherwise use URL context): ${rawInput}\n\n${photoParams}` }];
        }
      } else if (inputType === 'url') {
        setStatusText('Fetching page…');
        let pageContent = '';
        try {
          const fetchResp = await fetch('/api/fetch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: rawInput }) });
          if (fetchResp.ok) { const fetchData = await fetchResp.json(); pageContent = fetchData.text || fetchData.content || ''; }
        } catch(e) {}
        const photoParams = buildPhotoParams(intrigue, mode);
        if (pageContent) {
          messages = [{ role: 'user', content: `Page content fetched from ${rawInput}:\n\n${pageContent.slice(0, 4000)}\n\n${photoParams}` }];
        } else {
          messages = [{ role: 'user', content: `Page URL: ${rawInput}\n\nBased on the URL and any context you can infer, generate photo article headlines.\n\n${photoParams}` }];
        }
      } else {
        const photoParams = buildPhotoParams(intrigue, mode);
        messages = [{ role: 'user', content: `${rawInput}\n\n${photoParams}` }];
      }
    } else {
      let userMsg = rawInput;
      if (intrigue) {
        userMsg += `\n\n---\nINTRIGUE — USE THIS AS THE CORE HOOK FOR ALL HEADLINES:\n"${intrigue}"\n\nAll 5 angles and every headline must be built around this specific intrigue. Each angle approaches the same intrigue from a different emotional and structural lens.`;
      }
      if (mode === "more") {
        userMsg += `\n\nGenerate 7 DIFFERENT headlines per angle. Do not repeat any headline from before.`;
      }
      messages = [{ role: 'user', content: userMsg }];
    }

    setStatusText('Generating…');
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 2000, system: currentPrompt, messages })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error("No JSON in response");
    lastResult = JSON.parse(match[0]);
    renderOutput(lastResult);
    document.getElementById("regenBtn").style.display = "inline-block";

  } catch(e) {
    setError("Error: " + e.message);
  }

  btn.disabled = false;
  regenBtn.disabled = false;
  setStatus(false);
}

function buildPhotoParams(intrigue, mode) {
  const photoCount = document.getElementById('photoCount').value.trim() || '30+';
  const photoSubtype = document.getElementById('photoSubtype').value;
  const subtypeLabels = {
    transformation: 'transformation / physical change over time',
    family: 'family life, kids, or relationship',
    love_story: 'love story or couple journey',
    career: 'career journey or rise to fame',
    outfits: 'outfits, style, or red carpet looks',
    then_now_cast: 'then & now or cast reunion',
    biography: 'biography or life story',
    other: 'general / other (choose the best angle based on the content)'
  };
  let params = `PHOTO ARTICLE PARAMETERS:\n- Photo count: ${photoCount}\n- Article subtype: ${subtypeLabels[photoSubtype] || photoSubtype}\n- Photo descriptor: Choose the most accurate descriptor based on the content (rare, little-seen, private, intimate, wild, then-and-now, before-and-after, behind-the-scenes, genuine/candid). Vary descriptors across headlines — do NOT use the same word every time.\n\nEvery headline MUST end with the photo count "${photoCount}" + chosen descriptor + PHOTOS/PICS/IMAGES.`;
  if (intrigue) {
    params += `\n\nINTRIGUE — USE THIS AS THE CORE HOOK FOR ALL HEADLINES:\n"${intrigue}"\n\nAll 5 angles and every headline must be built around this specific intrigue.`;
  }
  if (mode === "more") {
    params += `\n\nGenerate 7 DIFFERENT headlines per angle. Do not repeat any headline from before.`;
  }
  return params;
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function setStatus(loading) {
  if (!loading) { document.getElementById("status").innerHTML = ""; return; }
  document.getElementById("status").innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
}

function setStatusText(text) {
  document.getElementById("status").innerHTML = `<span style="color:#6b6560;font-size:13px">${text}</span>`;
}

function setError(msg) {
  const el = document.getElementById("errorBar");
  el.style.display = msg ? "block" : "none";
  el.textContent = msg;
}

function renderOutput(result) {
  const out = document.getElementById("output");
  const sections = document.getElementById("anglesSections");
  out.style.display = "block";

  const angles = currentMode === 'photo' ? PHOTO_ANGLES : NEWS_ANGLES;
  const badgeClass = currentMode === 'photo' ? 'photo' : 'news';
  const badgeLabel = currentMode === 'photo' ? 'Photo' : 'News';

  sections.innerHTML = angles.map(a => {
    const headlines = result[a.key] || [];
    return `<div class="angle-section">
      <div class="angle-title">
        <span class="angle-icon">${a.icon}</span>${a.label}
        <span class="mode-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      ${headlines.map((h) => `
        <div class="headline-item">
          <div class="headline-text">${h}</div>
          <div class="headline-actions">
            <button class="copy-hl" onclick="copyHeadline(this, '${h.replace(/'/g,"\\'")}')">Copy</button>
          </div>
        </div>`).join("")}
    </div>`;
  }).join("");

  angles.forEach(a => { (result[a.key] || []).forEach(h => addToBank(h, a.label, currentMode)); });
  updateBankBadge();
  out.scrollIntoView({ behavior: "smooth", block: "start" });
}

function saveHeadlineFromOutput(btn, text, angle) {
  const added = addToBank(text, angle, currentMode);
  if (added) { btn.textContent = '✓ Saved'; btn.classList.add('saved'); setTimeout(() => { btn.textContent = '+ Bank'; btn.classList.remove('saved'); }, 2000); }
  else { btn.textContent = 'In Bank'; setTimeout(() => { btn.textContent = '+ Bank'; }, 1500); }
  updateBankBadge();
}

function copyHeadline(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "Copied";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  });
}

function copyAll() {
  if (!lastResult) return;
  const angles = currentMode === 'photo' ? PHOTO_ANGLES : NEWS_ANGLES;
  const lines = angles.flatMap(a => { const hs = lastResult[a.key] || []; return [`\n${a.label.toUpperCase()}`, ...hs]; });
  navigator.clipboard.writeText(lines.join("\n")).then(() => {
    const btn = document.querySelector(".output-toolbar .tool-btn");
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy all", 2000);
  });
}

function resetOutput() {
  document.getElementById("output").style.display = "none";
  document.getElementById("mainInput").value = "";
  document.getElementById("intrigueInput").value = "";
  document.getElementById("regenBtn").style.display = "none";
  document.getElementById('inputTypeBadge').classList.remove('visible');
  lastResult = null;
}

document.getElementById("mainInput").addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) generate("all");
});

updateBankBadge();
</script>
